services:
  # 백엔드 서비스만 배포 (프론트엔드는 Vercel에서)
  - type: web
    name: remicon-backend
    env: python
    plan: free
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Render 대시보드에서 수동으로 설정